<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEZAS — GitHub Backup</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff00;
    --accent2: #00ff88;
    --text: #f0f0f0;
    --muted: #555555;
    --danger: #ff4444;
    --success: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(232,255,0,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,255,136,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
  }

  .header {
    margin-bottom: 40px;
  }

  .logo {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 16px;
  }

  .logo span {
    color: var(--accent);
  }

  h1 {
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }

  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field.full {
    grid-column: 1 / -1;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  input, select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
  }

  input::placeholder {
    color: var(--muted);
  }

  .select-wrapper {
    position: relative;
  }

  .select-wrapper::after {
    content: '▼';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 9px;
    color: var(--muted);
    pointer-events: none;
  }

  select option {
    background: #111;
    color: var(--text);
    padding: 8px;
  }

  .btn {
    width: 100%;
    padding: 14px 24px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 3px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    background: #f5ff40;
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .btn-secondary:hover {
    background: var(--border);
    border-color: var(--muted);
    transform: translateY(-1px);
  }

  .status {
    display: none;
    padding: 14px 16px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    margin-bottom: 16px;
    border: 1px solid;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .status.loading {
    display: block;
    border-color: var(--accent);
    background: rgba(232,255,0,0.05);
    color: var(--accent);
  }

  .status.success {
    display: block;
    border-color: var(--success);
    background: rgba(0,255,136,0.05);
    color: var(--success);
  }

  .status.error {
    display: block;
    border-color: var(--danger);
    background: rgba(255,68,68,0.05);
    color: var(--danger);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .workflow-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .workflow-count span {
    color: var(--accent);
  }

  .token-warning {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 6px;
  }

  .token-warning strong {
    color: var(--accent);
  }

  .footer {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    margin-top: 24px;
  }

  .pulse {
    display: inline-block;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 2px;
    background: rgba(232,255,0,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,255,0,0.2);
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo"><span>KEZAS</span> — N8N TOOLS</div>
    <h1>GitHub<br><em>Backup</em></h1>
    <p class="subtitle">// zapisz workflow do repozytorium</p>
  </div>

  <!-- KONFIGURACJA -->
  <div class="card">
    <div class="section-label">01 — Konfiguracja</div>
    <div class="config-grid">
      <div class="field full">
        <label>N8N API URL</label>
        <input type="text" id="n8nUrl" value="https://kezas.app.n8n.cloud/api/v1" placeholder="https://twoj-n8n.cloud/api/v1" />
      </div>
      <div class="field full">
        <label>N8N API Key</label>
        <input type="password" id="n8nKey" placeholder="eyJhbGciOi..." />
        <div class="token-warning"><strong>!</strong> Klucz z Settings → API w n8n</div>
      </div>
      <div class="field full">
        <label>GitHub Token</label>
        <input type="password" id="githubToken" placeholder="ghp_..." />
        <div class="token-warning"><strong>!</strong> Token z GitHub Settings → Developer Settings</div>
      </div>
      <div class="field">
        <label>GitHub Owner</label>
        <input type="text" id="githubOwner" value="Kezas-N8N" placeholder="Kezas-N8N" />
      </div>
      <div class="field">
        <label>GitHub Repo</label>
        <input type="text" id="githubRepo" value="n8n-workflows" placeholder="n8n-workflows" />
      </div>
    </div>
    <button class="btn btn-secondary" onclick="loadWorkflows()">
      ⟳ Załaduj listę workflows
    </button>
  </div>

  <!-- WYBOR WORKFLOW -->
  <div class="card">
    <div class="section-label">02 — Wybierz workflow</div>
    <div class="field" style="margin-bottom: 16px;">
      <label>Workflow</label>
      <div class="select-wrapper">
        <select id="workflowSelect">
          <option value="">— najpierw załaduj listę —</option>
        </select>
      </div>
      <div class="workflow-count" id="workflowCount"></div>
    </div>

    <div id="statusBox" class="status"></div>

    <button class="btn" onclick="backupWorkflow()" id="backupBtn" disabled>
      ↑ Zapisz do GitHub
    </button>
  </div>

  <div class="footer">
    // pliki zapisywane w: <strong>workflows/</strong> — historia zmian w GitHub
  </div>
</div>

<script>
  let workflows = [];

  async function loadWorkflows() {
    const url = document.getElementById('n8nUrl').value.trim();
    const key = document.getElementById('n8nKey').value.trim();

    if (!url || !key) {
      showStatus('error', '❌ Wpisz N8N URL i API Key');
      return;
    }

    showStatus('loading', '⟳ Ładuję listę workflows...');

    try {
      const res = await fetch(`${url}/workflows?limit=250`, {
        headers: {
          'X-N8N-API-KEY': key,
          'Accept': 'application/json'
        }
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(`HTTP ${res.status}: ${err.message || 'Błąd autoryzacji'}`);
      }

      const data = await res.json();
      workflows = data.data || [];

      // Sortuj alfabetycznie
      workflows.sort((a, b) => a.name.localeCompare(b.name));

      // Wypełnij dropdown
      const select = document.getElementById('workflowSelect');
      select.innerHTML = '<option value="">— wybierz workflow —</option>';

      workflows.forEach(wf => {
        const opt = document.createElement('option');
        opt.value = wf.id;
        opt.textContent = wf.name + (wf.active ? ' ▶' : '');
        select.appendChild(opt);
      });

      document.getElementById('workflowCount').innerHTML = 
        `Znaleziono: <span>${workflows.length}</span> workflows`;
      document.getElementById('backupBtn').disabled = false;

      showStatus('success', `✅ Załadowano ${workflows.length} workflows`);

    } catch (err) {
      showStatus('error', `❌ Błąd: ${err.message}`);
    }
  }

  async function backupWorkflow() {
    const n8nUrl = document.getElementById('n8nUrl').value.trim();
    const n8nKey = document.getElementById('n8nKey').value.trim();
    const githubToken = document.getElementById('githubToken').value.trim();
    const owner = document.getElementById('githubOwner').value.trim();
    const repo = document.getElementById('githubRepo').value.trim();
    const workflowId = document.getElementById('workflowSelect').value;

    if (!workflowId) {
      showStatus('error', '❌ Wybierz workflow z listy');
      return;
    }

    if (!githubToken) {
      showStatus('error', '❌ Wpisz GitHub Token');
      return;
    }

    const workflowName = workflows.find(w => w.id === workflowId)?.name || workflowId;
    document.getElementById('backupBtn').disabled = true;

    try {
      // KROK 1: Pobierz pełny JSON workflow
      showStatus('loading', `⟳ Pobieranie workflow "${workflowName}"...`);

      const wfRes = await fetch(`${n8nUrl}/workflows/${workflowId}`, {
        headers: { 'X-N8N-API-KEY': n8nKey, 'Accept': 'application/json' }
      });

      if (!wfRes.ok) throw new Error(`Nie można pobrać workflow: HTTP ${wfRes.status}`);
      const wfData = await wfRes.json();

      // KROK 2: Przygotuj plik
      const safeName = workflowName.replace(/[^a-zA-Z0-9_\-]/g, '_').replace(/__+/g, '_');
      const fileName = `workflows/${safeName}.json`;
      const content = JSON.stringify(wfData, null, 2);
      const encoded = btoa(unescape(encodeURIComponent(content)));

      showStatus('loading', `⟳ Sprawdzam czy plik istnieje na GitHub...`);

      // KROK 3: Sprawdź czy plik już istnieje (potrzebne SHA do update)
      const checkRes = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/contents/${fileName}`,
        {
          headers: {
            'Authorization': `Bearer ${githubToken}`,
            'Accept': 'application/vnd.github+json'
          }
        }
      );

      let sha = null;
      if (checkRes.ok) {
        const existing = await checkRes.json();
        sha = existing.sha;
      }

      // KROK 4: Push do GitHub
      const today = new Date().toISOString().split('T')[0];
      showStatus('loading', `⟳ Zapisuję do GitHub... (${sha ? 'aktualizacja' : 'nowy plik'})`);

      const body = {
        message: `Backup: ${workflowName} - ${today}`,
        content: encoded
      };
      if (sha) body.sha = sha;

      const pushRes = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/contents/${fileName}`,
        {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${githubToken}`,
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        }
      );

      if (!pushRes.ok) {
        const err = await pushRes.json().catch(() => ({}));
        throw new Error(`GitHub error: ${err.message || pushRes.status}`);
      }

      const result = await pushRes.json();
      const fileUrl = result.content?.html_url || '#';

      showStatus('success', 
        `✅ ZAPISANO POMYŚLNIE!\n\nWorkflow: ${workflowName}\nPlik: ${fileName}\nAkcja: ${sha ? 'ZAKTUALIZOWANY' : 'NOWY PLIK'}\nData: ${today}\n\nLink: ${fileUrl}`
      );

    } catch (err) {
      showStatus('error', `❌ Błąd: ${err.message}`);
    } finally {
      document.getElementById('backupBtn').disabled = false;
    }
  }

  function showStatus(type, message) {
    const box = document.getElementById('statusBox');
    box.className = `status ${type}`;
    box.textContent = message;
  }
</script>
</body>
</html>
